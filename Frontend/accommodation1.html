<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accommodation Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="CSS/accommodation1.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet" />
  <link rel="icon" href="/Assests/pictures/site.png" type="image/x-icon" />
  </head>
  <body>
    
    <div id="app"></div>
    
    <div id="loginPopup" style="
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(26, 26, 26, 0.8); 
    backdrop-filter: blur(4px); 
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    font-family: 'Segoe UI', sans-serif;
  ">
    <div style="
      background: #fff; 
      padding: 50px 40px;
      border-radius: 16px;
      text-align: center;
      max-width: 450px;
      width: 90%;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.4s ease-in-out;
    ">
      <h2 style="
      margin-bottom: 16px;
      color: #5D1049; 
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
  ">
      <i class="fas fa-lock" style="margin-right: 8px; font-size: 30px; color: #5D1049;"></i> 
      Login Required
  </h2>
  
      <p style="
        margin-bottom: 30px;
        color: #666; 
        font-size: 16px;
      ">You must login to access this feature. Please click the button below to sign in.</p>
  
      <button id="popupLoginBtn" style="
        padding: 12px 30px;
        background-color: #5D1049; 
        color: #fff; 
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      ">Login</button>
    </div>
  </div>
  
  <!-- Optional Fade Animation -->
  <style>
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
  </style>

    <script type="module" src="/JavaScript/accommodation1.js"></script>
    <script src="/JavaScript/auth.js"></script>
    
  </body>
</html>
