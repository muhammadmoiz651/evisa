<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/CSS/forget.css">
    <link rel="icon" href="/Assests/pictures/site.png" type="image/x-icon" />
  </head>
  <body>
    <div class="container">
      <div class="login-card">
        <div class="login-left">
          <h2>Forgot Password</h2>
          <p class="description">Enter your email address and we'll send you a link to reset your password.</p>
          <form id="forgotPasswordForm">
            <input type="email" placeholder="Email" required>
            <button type="submit" class="reset-btn">RESET PASSWORD</button>
          </form>
          <a href="/signin" class="back-to-login">Back to Login</a>
        </div>
        <div class="login-right">
          <h1>Remember Password?</h1>
          <p>Sign in and continue your journey with us</p>
          <a href="/signin" class="sign-in-link-btn">SIGN IN</a>
        </div>
      </div>
    </div>
    <script src="/JavaScript/forget.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  </body>
</html>
